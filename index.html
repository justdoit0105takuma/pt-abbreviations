<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医療略語 学習ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f3f4f6;
  --surface: #ffffff;
  --surface2: #eceef2;
  --border: #d8dce6;
  --text: #181a20;
  --text-muted: #6a718a;
  --text-faint: #aab0c4;
  --accent: #1a4a8a;
  --accent-bg: #e6eef8;
  --accent-text: #0f2d5a;
  --green: #2a7a4b;
  --green-bg: #e8f5ee;
  --green-text: #1a5530;
  --amber: #7a5000;
  --amber-bg: #fdf3da;
  --amber-text: #4c3100;
  --coral: #9a3020;
  --coral-bg: #fdeee8;
  --coral-text: #6a1e10;
  --purple: #5a348a;
  --purple-bg: #f0eafa;
  --purple-text: #3a1a6a;
  --teal: #1a6a5a;
  --teal-bg: #e4f4f0;
  --teal-text: #0f4438;
  --orange: #8a4a00;
  --orange-bg: #fdf0e0;
  --orange-text: #5a2e00;
  --pink: #8a1a5a;
  --pink-bg: #faeaf3;
  --pink-text: #5a0a38;
  --radius: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1000px; margin: 0 auto; }
.header-title { font-size: 15px; font-weight: 700; }
.header-sub { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.main { max-width: 1000px; margin: 0 auto; padding: 1.25rem 1rem; }
.controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 1.25rem; }
.tab-group { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; flex-wrap: wrap; }
.tab { padding: 7px 11px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-right: 1px solid var(--border); transition: all 0.15s; white-space: nowrap; }
.tab:last-child { border-right: none; }
.tab.active { background: var(--accent); color: #fff; font-weight: 500; }
.tab:hover:not(.active) { background: var(--surface2); }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap input { width: 100%; padding: 7px 12px 7px 32px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 14px; pointer-events: none; }
.mode-group { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.mode-btn { padding: 7px 14px; font-size: 12.5px; font-family: 'Noto Sans JP', sans-serif; border: none; border-right: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
.mode-btn:last-child { border-right: none; }
.mode-btn.active { background: var(--green); color: #fff; font-weight: 500; }
.mode-btn:hover:not(.active) { background: var(--surface2); }
.count-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
th { background: var(--surface2); color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.abbr-cell { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 14px; letter-spacing: 0.02em; }
.full-cell { font-size: 12.5px; }
.ja-cell { font-size: 12.5px; color: var(--text-muted); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; white-space: nowrap; font-weight: 500; }
.b-bone     { background: var(--amber-bg);  color: var(--amber-text); }
.b-ligament { background: var(--coral-bg);  color: var(--coral-text); }
.b-muscle   { background: var(--purple-bg); color: var(--purple-text); }
.b-nerve    { background: var(--teal-bg);   color: var(--teal-text); }
.b-joint    { background: var(--accent-bg); color: var(--accent-text); }
.b-landmark { background: var(--orange-bg); color: var(--orange-text); }
.b-test     { background: var(--green-bg);  color: var(--green-text); }
.b-motion   { background: var(--pink-bg);   color: var(--pink-text); }
.b-disease  { background: var(--orange-bg); color: var(--orange-text); }
.b-other    { background: var(--surface2);  color: var(--text-muted); }
/* QUIZ */
.quiz-wrap { display: flex; flex-direction: column; gap: 1rem; }
.quiz-progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 0.25rem; }
.quiz-progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s ease; }
.quiz-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 0.5rem; }
.quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
.quiz-q { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; line-height: 1.5; }
.quiz-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-bottom: 0.75rem; font-family: 'DM Mono', monospace; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }
.option-btn { padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 12.5px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; text-align: left; line-height: 1.5; transition: all 0.15s; }
.option-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); }
.option-btn.correct { background: var(--green-bg); border-color: var(--green); color: var(--green-text); font-weight: 500; }
.option-btn.wrong   { background: var(--coral-bg); border-color: var(--coral); color: var(--coral-text); }
.option-btn:disabled { cursor: default; }
.hint-box { margin-top: 1rem; background: var(--surface2); border-radius: var(--radius); padding: 10px 14px; font-size: 12.5px; color: var(--text-muted); line-height: 1.8; display: none; border-left: 3px solid var(--accent); }
.hint-abbr { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 15px; color: var(--text); }
.quiz-nav { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.score-display { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); }
.score-num { font-size: 18px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
.btn { padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.15s; }
.btn:hover:not(:disabled) { background: var(--surface2); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 500; }
.btn-primary:hover:not(:disabled) { background: var(--accent-text); }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; text-align: center; }
.result-score { font-size: 52px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--accent); line-height: 1; }
.result-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.result-pct { font-size: 22px; font-weight: 700; margin-top: 8px; }
.result-msg { font-size: 14px; color: var(--text-muted); margin-top: 12px; margin-bottom: 1.5rem; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-title">医療略語 学習ツール</div>
    <div class="header-sub">PT必須 — 骨・靭帯・筋・神経・関節・運動・テスト・疾患・評価</div>
  </div>
</header>
<div class="main">
  <div class="controls">
    <div class="tab-group" id="tabGroup">
      <button class="tab active" onclick="setGroup('all')">すべて</button>
      <button class="tab" onclick="setGroup('bone')">骨・ランドマーク</button>
      <button class="tab" onclick="setGroup('ligament')">靭帯・軟部組織</button>
      <button class="tab" onclick="setGroup('muscle')">筋</button>
      <button class="tab" onclick="setGroup('nerve')">神経・血管</button>
      <button class="tab" onclick="setGroup('joint')">関節・部位</button>
      <button class="tab" onclick="setGroup('motion')">運動・肢位</button>
      <button class="tab" onclick="setGroup('test')">検査・テスト</button>
      <button class="tab" onclick="setGroup('disease')">疾患・障害</button>
      <button class="tab" onclick="setGroup('other')">評価・その他</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="略語・正式名・日本語で絞り込み…" oninput="onSearch()">
    </div>
    <div class="mode-group">
      <button class="mode-btn active" id="btnTable" onclick="setMode('table')">一覧</button>
      <button class="mode-btn" id="btnQuiz" onclick="setMode('quiz')">クイズ</button>
    </div>
    <span class="count-label" id="countLabel"></span>
  </div>

  <div id="tableView">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="min-width:70px">略語</th>
            <th style="min-width:60px">カテゴリ</th>
            <th style="min-width:220px">正式名称（英語）</th>
            <th style="min-width:160px">日本語</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="quizView" style="display:none">
    <div class="quiz-wrap">
      <div>
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="quiz-meta"><span id="quizCounter">1 / 20</span><span id="quizMode"></span></div>
      </div>
      <div id="quizContent"></div>
      <div class="quiz-nav">
        <div class="score-display"><span class="score-num" id="scoreNum">0</span><span>/ <span id="scoreDen">0</span> 正解</span></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn" onclick="restartQuiz()">最初から</button>
          <button class="btn btn-primary" id="nextBtn" onclick="nextQuiz()" disabled>次へ →</button>
        </div>
      </div>
    </div>
  </div>
</div>

  { group:'disease', abbr:'RCT',  full:'Rotator Cuff Tear', ja:'腱板断裂' },
  { group:'disease', abbr:'FF',   full:'Femoral Fracture', ja:'大腿骨骨折' },
  { group:'disease', abbr:'FNF',  full:'Femoral Neck Fracture', ja:'大腿骨頸部骨折' },
  { group:'disease', abbr:'VCF',  full:'Vertebral Compression Fracture', ja:'椎体圧迫骨折' },
  { group:'disease', abbr:'DDH',  full:'Developmental Dysplasia of the Hip', ja:'発育性股関節形成不全' },
  { group:'disease', abbr:'AVN / ONFH', full:'Avascular Necrosis / Osteonecrosis of Femoral Head', ja:'大腿骨頭壊死' },
  { group:'disease', abbr:'DISH', full:'Diffuse Idiopathic Skeletal Hyperostosis', ja:'びまん性特発性骨増殖症' },

  // ===== 疾患・障害（代謝・内部・その他） =====
  { group:'disease', abbr:'DM',   full:'Diabetes Mellitus', ja:'糖尿病' },
  { group:'disease', abbr:'T2DM', full:'Type 2 Diabetes Mellitus', ja:'2型糖尿病' },
  { group:'disease', abbr:'CKD',  full:'Chronic Kidney Disease', ja:'慢性腎臓病' },
  { group:'disease', abbr:'ESRD', full:'End-Stage Renal Disease', ja:'末期腎不全' },
  { group:'disease', abbr:'CLD',  full:'Chronic Liver Disease', ja:'慢性肝疾患' },
  { group:'disease', abbr:'MetS', full:'Metabolic Syndrome', ja:'メタボリックシンドローム' },
  { group:'disease', abbr:'DKD',  full:'Diabetic Kidney Disease', ja:'糖尿病性腎症' },
  { group:'disease', abbr:'CVD',  full:'Cardiovascular Disease', ja:'心血管疾患' },
  { group:'disease', abbr:'LC',   full:'Lung Cancer', ja:'肺癌' },
  { group:'disease', abbr:'Ca',   full:'Cancer / Carcinoma', ja:'癌' },
  { group:'disease', abbr:'CIN',  full:'Chemotherapy-Induced Neuropathy', ja:'化学療法誘発性末梢神経障害' },
  { group:'disease', abbr:'GMFCS', full:'Gross Motor Function Classification System', ja:'粗大運動能力分類システム（脳性麻痺）' },
  { group:'disease', abbr:'ID',   full:'Intellectual Disability', ja:'知的障害' },
  { group:'disease', abbr:'ASD',  full:'Autism Spectrum Disorder', ja:'自閉スペクトラム症' },
  { group:'disease', abbr:'ROP',  full:'Retinopathy of Prematurity', ja:'未熟児網膜症' },
  { group:'disease', abbr:'Frailty', full:'Frailty', ja:'フレイル（虚弱）' },
  { group:'disease', abbr:'Sarcopenia', full:'Sarcopenia', ja:'サルコペニア（筋減弱症）' },
  { group:'disease', abbr:'GMFM', full:'Gross Motor Function Measure', ja:'粗大運動能力尺度' },
];

const GROUP_LABELS = {
  bone:'骨・ランドマーク', ligament:'靭帯・軟部組織', muscle:'筋',
  nerve:'神経・血管', joint:'関節・部位', motion:'運動・肢位',
  test:'検査・テスト', disease:'疾患・障害', other:'評価・その他'
};
const GROUP_BADGE = {
  bone:'b-bone', ligament:'b-ligament', muscle:'b-muscle', nerve:'b-nerve',
  joint:'b-joint', motion:'b-motion', test:'b-test', disease:'b-disease', other:'b-other'
};
const GROUP_KEYS = ['all','bone','ligament','muscle','nerve','joint','motion','test','disease','other'];

const QUIZ_TYPES = [
  { label:'略語→正式名称', q: d=>`「${d.abbr}」の正式名称（英語）は？`, ans: d=>d.full },
  { label:'略語→日本語',   q: d=>`「${d.abbr}」を日本語で言うと？`,     ans: d=>d.ja },
  { label:'日本語→略語',   q: d=>`「${d.ja}」の略語は？`,               ans: d=>d.abbr },
];

let currentGroup='all', currentMode='table', searchTerm='';
let quizData=[], quizIndex=0, score=0, answered=false;

function getFiltered() {
  return DATA.filter(d => {
    const gOk = currentGroup==='all' || d.group===currentGroup;
    const sOk = !searchTerm || [d.abbr,d.full,d.ja].some(v=>v.toLowerCase().includes(searchTerm.toLowerCase()));
    return gOk && sOk;
  });
}

function renderTable() {
  const list = getFiltered();
  document.getElementById('countLabel').textContent = `${list.length} 件`;
  const tbody = document.getElementById('tableBody');
  if (!list.length) { tbody.innerHTML='<tr><td colspan="4"><div class="empty-state">該当する略語がありません</div></td></tr>'; return; }
  tbody.innerHTML = list.map(d => {
    const badgeCls = GROUP_BADGE[d.group] || 'b-other';
    const label = currentGroup==='all' ? GROUP_LABELS[d.group] : '';
    return `<tr>
      <td class="abbr-cell">${d.abbr}</td>
      <td>${label ? `<span class="badge ${badgeCls}">${label}</span>` : ''}</td>
      <td class="full-cell">${d.full}</td>
      <td class="ja-cell">${d.ja}</td>
    </tr>`;
  }).join('');
}

function setGroup(g) {
  currentGroup = g;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', GROUP_KEYS[i]===g));
  currentMode==='table' ? renderTable() : (buildQuiz(), renderQuiz());
}

function setMode(m) {
  currentMode = m;
  document.getElementById('tableView').style.display = m==='table' ? '' : 'none';
  document.getElementById('quizView').style.display  = m==='quiz'  ? '' : 'none';
  document.getElementById('btnTable').classList.toggle('active', m==='table');
  document.getElementById('btnQuiz').classList.toggle('active',  m==='quiz');
  m==='table' ? renderTable() : (buildQuiz(), renderQuiz());
}

function onSearch() {
  searchTerm = document.getElementById('searchInput').value;
  renderTable();
}

function shuffle(a) { return [...a].sort(()=>Math.random()-0.5); }

function buildQuiz() {
  const list = getFiltered();
  if (!list.length) { quizData=[]; return; }
  quizData = shuffle(list).slice(0, Math.min(list.length, 20)).map(d => {
    const type = QUIZ_TYPES[Math.floor(Math.random()*QUIZ_TYPES.length)];
    const correct = type.ans(d);
    const pool = list.filter(x => type.ans(x) !== correct);
    const distractors = shuffle(pool).slice(0,3).map(x => type.ans(x));
    while (distractors.length < 3) distractors.push('—');
    return {
      type: type.label,
      question: type.q(d),
      correct,
      opts: shuffle([correct, ...distractors]),
      hint: `略語: ${d.abbr}　正式名称: ${d.full}　日本語: ${d.ja}`
    };
  });
  quizIndex=0; score=0; answered=false;
}

function renderQuiz() {
  const total = quizData.length;
  document.getElementById('progressFill').style.width = total ? `${(quizIndex/total)*100}%` : '0%';
  document.getElementById('quizCounter').textContent  = total ? `${quizIndex+1} / ${total}` : '—';
  document.getElementById('quizMode').textContent     = currentGroup==='all' ? 'すべて' : (GROUP_LABELS[currentGroup]||'');
  document.getElementById('scoreNum').textContent     = score;
  document.getElementById('scoreDen').textContent     = quizIndex;
  document.getElementById('nextBtn').disabled         = true;
  answered = false;
  const content = document.getElementById('quizContent');
  if (!quizData.length) {
    content.innerHTML = '<div class="result-card"><p style="color:var(--text-muted)">対象の略語がありません。</p></div>';
    return;
  }
  const q = quizData[quizIndex];
  content.innerHTML = `
    <div class="quiz-card">
      <span class="quiz-tag" style="background:var(--accent-bg);color:var(--accent-text);">${q.type}</span>
      <div class="quiz-q">${q.question}</div>
      <div class="options-grid">
        ${q.opts.map((o,i)=>`<button class="option-btn" id="opt${i}" onclick="answer(${i})">${o}</button>`).join('')}
      </div>
      <div class="hint-box" id="hintBox"><span class="hint-abbr">${quizData[quizIndex]?.abbr ?? ''}</span><br>${q.hint}</div>
    </div>`;
}

function answer(i) {
  if (answered) return;
  answered = true;
  const q = quizData[quizIndex];
  for (let j=0; j<q.opts.length; j++) {
    const el = document.getElementById(`opt${j}`);
    el.disabled = true;
    if (q.opts[j]===q.correct) el.classList.add('correct');
    else if (j===i) el.classList.add('wrong');
  }
  if (q.opts[i]===q.correct) score++;
  document.getElementById('hintBox').style.display = 'block';
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreDen').textContent = quizIndex+1;
}

function nextQuiz() {
  quizIndex++;
  const total = quizData.length;
  if (quizIndex >= total) {
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('scoreDen').textContent = total;
    const pct = Math.round(score/total*100);
    const msg = pct>=80 ? '🎉 すばらしい！' : pct>=60 ? '📚 もう一息！' : '💪 繰り返し挑戦しよう。';
    document.getElementById('quizContent').innerHTML = `
      <div class="result-card">
        <div class="result-score">${score}</div>
        <div class="result-label">/ ${total} 問正解</div>
        <div class="result-pct">${pct}%</div>
        <div class="result-msg">${msg}</div>
        <button class="btn btn-primary" onclick="restartQuiz()" style="font-size:14px;padding:10px 24px;">もう一度チャレンジ</button>
      </div>`;
    return;
  }
  renderQuiz();
}

function restartQuiz() { buildQuiz(); renderQuiz(); }

renderTable();
</script>
</body>
</html>
